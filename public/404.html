<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>大田的数学空间</title>
  <script>
    // SPA 路由：GitHub Pages 不支持直接的重定向，用 sessionStorage 保存路径
    var path = location.pathname.replace(/\/mydeploy-web/, '') || '/';
    sessionStorage.setItem('redirect', path + location.search + location.hash);
    location.replace('/mydeploy-web/');
  </script>
</head>
<body></body>
</html>
